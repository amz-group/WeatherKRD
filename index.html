<!DOCTYPE html>

<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>کەش و هەوای کوردستان</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;overflow-x:hidden;background:#07111f}
body{font-family:'Noto Naskh Arabic',serif;direction:rtl;color:#e8f4ff}

#bg{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#071828 0%,#0c2240 40%,#071828 100%)}
#bg-glow{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(56,189,248,.13) 0%,transparent 70%)}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.st{position:absolute;border-radius:50%;background:#fff;animation:tw var(–d,3s) var(–dl,0s) infinite alternate}
@keyframes tw{0%{opacity:.15}100%{opacity:.9}}

#app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:20px 16px 60px}

.hdr{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:20px}
.hdr-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.hdr-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(140deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 4px 16px rgba(251,191,36,.35)}
.hdr-title{font-size:16px;font-weight:700;color:#fcd34d;line-height:1.2}
.hdr-sub{font-size:11px;color:rgba(232,244,255,.4);margin-top:2px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}
.live-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 11px;font-size:11px;color:rgba(232,244,255,.55);white-space:nowrap}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22d3a0;flex-shrink:0;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,211,160,.5)}60%{box-shadow:0 0 0 5px rgba(34,211,160,0)}}
.refresh-btn{border:1px solid rgba(56,189,248,.3);background:rgba(56,189,248,.1);border-radius:20px;color:#38bdf8;font-family:‘Noto Naskh Arabic’,serif;font-size:12px;padding:5px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s}
.refresh-btn:hover{background:rgba(56,189,248,.2)}
.spin{display:inline-block}
.spinning .spin{animation:ro .7s linear infinite}
@keyframes ro{to{transform:rotate(360deg)}}

.search-wrap{margin-bottom:20px}
.search-inner{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:11px 15px;transition:border-color .25s}
.search-inner:focus-within{border-color:rgba(56,189,248,.45)}
.search-inner input{background:none;border:none;outline:none;width:100%;font-family:‘Noto Naskh Arabic’,serif;font-size:14px;color:#e8f4ff;direction:rtl}
.search-inner input::placeholder{color:rgba(232,244,255,.3)}
.search-icon{font-size:15px;color:rgba(232,244,255,.3);flex-shrink:0}

.sec-label{font-size:11px;font-weight:600;letter-spacing:.8px;color:rgba(232,244,255,.35);margin-bottom:11px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.sec-label::after{content:’’;flex:1;height:1px;background:rgba(255,255,255,.07)}

.feat{border-radius:18px;padding:20px;margin-bottom:20px;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(56,189,248,.16) 0%,rgba(7,17,31,.92) 65%);border:1px solid rgba(56,189,248,.22);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.feat::before{content:’’;position:absolute;top:-50px;right:-50px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.1),transparent 70%);pointer-events:none}
.feat-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.feat-info{flex:1;min-width:0}
.feat-name{font-size:26px;font-weight:700;color:#fff;line-height:1.1}
.feat-country{font-size:12px;color:rgba(232,244,255,.45);margin-top:4px}
.feat-cond{font-size:13px;color:rgba(232,244,255,.5);margin-top:5px}
.feat-right{text-align:center;flex-shrink:0}
.feat-emoji{font-size:48px;display:block;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.3));animation:fl 4s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.feat-temp{font-size:50px;font-weight:700;color:#fff;line-height:1.05;text-shadow:0 2px 16px rgba(56,189,248,.25)}
.feat-temp sup{font-size:.36em;color:#fcd34d;vertical-align:super;font-weight:600}
.feat-pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.pill{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:5px 11px;font-size:12px;color:rgba(232,244,255,.65)}

.err{display:none;align-items:center;gap:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);border-radius:11px;padding:11px 15px;font-size:13px;color:#fca5a5;margin-bottom:16px}
.err.show{display:flex}

.hourly{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:20px;scrollbar-width:none}
.hourly::-webkit-scrollbar{display:none}
.hr-card{flex-shrink:0;width:62px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:10px 0;text-align:center}
.hr-card.now{background:rgba(56,189,248,.13);border-color:rgba(56,189,248,.38)}
.hr-time{font-size:10px;color:rgba(232,244,255,.38);margin-bottom:5px}
.hr-icon{font-size:18px;margin-bottom:4px;line-height:1.2}
.hr-temp{font-size:13px;font-weight:600;color:#e8f4ff}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:460px){.grid{grid-template-columns:repeat(3,1fr)}}

.city-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:15px;padding:15px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;animation:fadeUp .45s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.city-card:hover{transform:translateY(-3px);border-color:rgba(56,189,248,.32);box-shadow:0 10px 24px rgba(0,0,0,.35)}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.cc-name{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.cc-en{font-size:10px;color:rgba(232,244,255,.28);margin-top:2px;direction:ltr;text-align:right}
.cc-emoji{font-size:30px;line-height:1;flex-shrink:0}
.cc-temp{font-size:28px;font-weight:700;color:#fff;line-height:1}
.cc-temp sup{font-size:.4em;color:#fcd34d;vertical-align:super;font-weight:600}
.cc-desc{font-size:11px;color:rgba(232,244,255,.4);margin-top:2px;margin-bottom:9px}
.cc-stats{display:flex;border-top:1px solid rgba(255,255,255,.07);padding-top:9px}
.cc-stat{flex:1;text-align:center;font-size:10px;color:rgba(232,244,255,.38);line-height:1.4}
.cc-stat-val{display:block;font-size:12px;font-weight:600;color:#7dd3fc;margin-bottom:1px}
.cc-err{color:rgba(239,68,68,.65);font-size:11px;margin-top:6px}

.v-hot{background:linear-gradient(135deg,rgba(239,68,68,.11),rgba(7,17,31,.85));border-color:rgba(239,68,68,.16)}
.v-hot .cc-temp{color:#fca5a5}
.v-warm{background:linear-gradient(135deg,rgba(251,191,36,.09),rgba(7,17,31,.85));border-color:rgba(251,191,36,.16)}
.v-warm .cc-temp{color:#fde68a}
.v-cool{background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(7,17,31,.85))}
.v-cold{background:linear-gradient(135deg,rgba(147,197,253,.09),rgba(7,17,31,.85))}

#loader{position:fixed;inset:0;z-index:999;background:#07111f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
#loader.out{opacity:0;pointer-events:none}
.ld-icon{font-size:52px;animation:spin2 2.5s linear infinite}
@keyframes spin2{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
.ld-txt{font-size:14px;color:#38bdf8;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

footer{text-align:center;color:rgba(232,244,255,.18);font-size:11px;margin-top:28px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05)}
</style>

</head>
<body>

<div id="bg"></div>
<div id="bg-glow"></div>
<div id="stars"></div>

<div id="loader">
  <div class="ld-icon">🌤️</div>
  <div class="ld-txt">داتای کەش و هەوا بارکردنە…</div>
</div>

<div id="app">

  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">☀️</div>
      <div>
        <div class="hdr-title">کەش و هەوای کوردستان</div>
        <div class="hdr-sub">Developed By: AMZ GROUP</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="updateTime">بارکردن…</span>
      </div>
      <button class="refresh-btn" id="refBtn" onclick="refreshAll()">
        <span class="spin" id="spinIcon">🔄</span>
        <span>نوێکردنەوە</span>
      </button>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input type="search" placeholder="گەڕان بە دوای شارێک…" id="searchBox" oninput="filterGrid(this.value)">
    </div>
  </div>

  <div class="err" id="errBox">
    <span>⚠️</span><span id="errMsg">هەڵەی بارکردن</span>
  </div>

  <div class="sec-label">🏔️ هەولێر — پایتەخت</div>
  <div class="feat">
    <div class="feat-row">
      <div class="feat-info">
        <div class="feat-name" id="fName">هەولێر</div>
        <div class="feat-country">کوردستان — عێراق</div>
        <div class="feat-cond" id="fCond">بارکردن…</div>
      </div>
      <div class="feat-right">
        <span class="feat-emoji" id="fIcon">🌤️</span>
        <div class="feat-temp" id="fTemp">—<sup>°C</sup></div>
      </div>
    </div>
    <div class="feat-pills" id="fPills"></div>
  </div>

  <div class="sec-label">🕐 پێشبینی کاتژمێرانە — هەولێر</div>
  <div class="hourly" id="hourlyRow"></div>

  <div class="sec-label">🏙️ شارەکانی کوردستان</div>
  <div class="grid" id="cityGrid"></div>

  <footer>© 2026 AMZ Group. All rights reserved.</footer>
</div>

<script>
const CITIES=[
  {n:'هەولێر',   e:'Erbil',         lat:36.19,lon:44.01,main:true},
  {n:'سلێمانی',  e:'Sulaymaniyah',  lat:35.56,lon:45.43},
  {n:'دهۆک',     e:'Duhok',         lat:36.87,lon:42.99},
  {n:'کەرکوک',   e:'Kirkuk',        lat:35.47,lon:44.39},
  {n:'زاخۆ',     e:'Zakho',         lat:37.14,lon:42.68},
  {n:'ڕانیە',    e:'Rania',         lat:36.26,lon:44.89},
  {n:'حەلەبجە',  e:'Halabja',       lat:35.18,lon:45.98},
  {n:'شقلاوە',   e:'Shaqlawa',      lat:36.41,lon:44.32},
  {n:'سۆران',    e:'Soran',         lat:36.65,lon:44.54},
  {n:'موسڵ',     e:'Mosul',         lat:36.34,lon:43.13},
  {n:'مەریوان',  e:'Marivan',       lat:35.52,lon:46.18},
  {n:'بانە',     e:'Baneh',         lat:35.99,lon:45.89},
  {n:'سەنە',     e:'Sanandaj',      lat:35.31,lon:46.99},
  {n:'پیرانشار', e:'Piranshahr',    lat:36.70,lon:45.14},
  {n:'ئاکرێ',    e:'Akre',          lat:36.74,lon:43.89},
  {n:'خانەقین',  e:'Khanaqin',      lat:34.35,lon:45.37},
];

const WMO={
  0:{d:'ئاسمانی ڕوون',i:'☀️'},1:{d:'بەشێک ڕوون',i:'🌤️'},
  2:{d:'کەمێک هەور',i:'⛅'},3:{d:'هەوری',i:'☁️'},
  45:{d:'مێ',i:'🌫️'},48:{d:'مێی بەستوو',i:'🌫️'},
  51:{d:'باران کەم',i:'🌦️'},53:{d:'باران',i:'🌧️'},55:{d:'باران زۆر',i:'🌧️'},
  61:{d:'باران سووک',i:'🌦️'},63:{d:'باران',i:'🌧️'},65:{d:'باران بەهێز',i:'🌧️'},
  71:{d:'بەفر سووک',i:'🌨️'},73:{d:'بەفر',i:'❄️'},75:{d:'بەفر بەهێز',i:'❄️'},
  80:{d:'باران ئارام',i:'🌦️'},81:{d:'باران',i:'🌧️'},82:{d:'باران زۆر',i:'⛈️'},
  95:{d:'گەمژەدار',i:'⛈️'},96:{d:'گەمژە و تەرکە',i:'⛈️'},99:{d:'گەمژەی بەهێز',i:'⛈️'},
};

function wmo(c){return WMO[c]||WMO[Math.floor(c/10)*10]||{d:'نادیار',i:'🌡️'}}
function tClass(t){if(t>=38)return 'v-hot';if(t>=28)return 'v-warm';if(t>=12)return 'v-cool';return 'v-cold'}

(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<100;i++){
    const s=document.createElement('div');s.className='st';
    const sz=Math.random()*1.8+.5;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;--d:'+(2+Math.random()*3)+'s;--dl:'+Math.random()*4+'s';
    c.appendChild(s);
  }
})();

async function fetchCity(city){
  const u='https://api.open-meteo.com/v1/forecast?latitude='+city.lat+'&longitude='+city.lon
    +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m'
    +'&hourly=temperature_2m,weather_code&wind_speed_unit=kmh&timezone=Asia%2FBaghdad&forecast_days=1';
  const r=await fetch(u);
  if(!r.ok)throw new Error(r.status);
  return{city,data:await r.json()};
}

async function fetchAll(){
  const res=await Promise.allSettled(CITIES.map(fetchCity));
  return res.map((r,i)=>r.status==='fulfilled'?r.value:{city:CITIES[i],data:null});
}

function renderFeat(item){
  if(!item?.data)return;
  const c=item.data.current,w=wmo(c.weather_code);
  document.getElementById('fName').textContent=item.city.n;
  document.getElementById('fIcon').textContent=w.i;
  document.getElementById('fCond').textContent=w.d;
  document.getElementById('fTemp').innerHTML=Math.round(c.temperature_2m)+'<sup>°C</sup>';
  document.getElementById('fPills').innerHTML=
    '<div class="pill">🌡️ هەستکردن '+Math.round(c.apparent_temperature)+'°</div>'
    +'<div class="pill">💧 شێ '+c.relative_humidity_2m+'%</div>'
    +'<div class="pill">💨 با '+Math.round(c.wind_speed_10m)+' km/h</div>';
}

function renderHourly(item){
  if(!item?.data)return;
  const now=new Date(),curH=now.getHours(),todayStr=now.toISOString().split('T')[0];
  const h=item.data.hourly,row=document.getElementById('hourlyRow');
  row.innerHTML='';let shown=0;
  for(let i=0;i<h.time.length&&shown<12;i++){
    const[d,t]=h.time[i].split('T'),hr=parseInt(t);
    if(d<todayStr||(d===todayStr&&hr<curH))continue;
    const w=wmo(h.weather_code[i]),isNow=d===todayStr&&hr===curH;
    const div=document.createElement('div');
    div.className='hr-card'+(isNow?' now':'');
    div.innerHTML='<div class="hr-time">'+(isNow?'ئێستا':hr+':00')+'</div>'
      +'<div class="hr-icon">'+w.i+'</div>'
      +'<div class="hr-temp">'+Math.round(h.temperature_2m[i])+'°</div>';
    row.appendChild(div);shown++;
  }
}

let allData=[];

function renderGrid(data){
  const grid=document.getElementById('cityGrid');
  grid.innerHTML='';
  const cities=data.filter(d=>!d.city.main);
  if(!cities.length){
    grid.innerHTML='<div style="color:rgba(232,244,255,.3);grid-column:1/-1;text-align:center;padding:24px 0">هیچ شارێک نەدۆزرایەوە</div>';
    return;
  }
  cities.forEach((item,idx)=>{
    const card=document.createElement('div');
    const hasData=!!item.data,tc=hasData?tClass(item.data.current.temperature_2m):'';
    card.className='city-card '+tc;
    card.style.animationDelay=(idx*.04)+'s';
    if(!hasData){
      card.innerHTML='<div class="cc-top"><div><div class="cc-name">'+item.city.n+'</div>'
        +'<div class="cc-en">'+item.city.e+'</div></div><div class="cc-emoji">❓</div></div>'
        +'<div class="cc-temp">—<sup>°</sup></div><div class="cc-err">هەڵەی بارکردن</div>';
    }else{
      const c=item.data.current,w=wmo(c.weather_code);
      card.innerHTML='<div class="cc-top"><div><div class="cc-name">'+item.city.n+'</div>'
        +'<div class="cc-en">'+item.city.e+'</div></div>'
        +'<div class="cc-emoji">'+w.i+'</div></div>'
        +'<div class="cc-temp">'+Math.round(c.temperature_2m)+'<sup>°C</sup></div>'
        +'<div class="cc-desc">'+w.d+'</div>'
        +'<div class="cc-stats">'
        +'<div class="cc-stat"><span class="cc-stat-val">💧'+c.relative_humidity_2m+'%</span>شێ</div>'
        +'<div class="cc-stat"><span class="cc-stat-val">💨'+Math.round(c.wind_speed_10m)+'</span>km/h</div>'
        +'<div class="cc-stat"><span class="cc-stat-val">🌡️'+Math.round(c.apparent_temperature)+'°</span>هەست</div>'
        +'</div>';
    }
    grid.appendChild(card);
  });
}

function filterGrid(v){
  if(!v.trim()){renderGrid(allData);return;}
  const lv=v.toLowerCase();
  renderGrid(allData.filter(d=>d.city.n.includes(v)||d.city.e.toLowerCase().includes(lv)));
}

function updateTime(){
  const now=new Date();
  document.getElementById('updateTime').textContent='نوێ: '
    +now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
}

async function load(){
  try{
    const res=await fetchAll();
    allData=res;
    const main=res.find(r=>r.city.main);
    renderFeat(main);renderHourly(main);renderGrid(res);updateTime();
    document.getElementById('errBox').classList.remove('show');
  }catch(err){
    document.getElementById('errBox').classList.add('show');
    document.getElementById('errMsg').textContent='هەڵەی بارکردن: '+err.message;
  }
}

async function refreshAll(){
  const btn=document.getElementById('refBtn');
  btn.classList.add('spinning');
  await load();
  btn.classList.remove('spinning');
}

(async function init(){
  await load();
  const ldr=document.getElementById('loader');
  ldr.classList.add('out');
  setTimeout(()=>ldr.remove(),600);
  setInterval(load,10*60*1000);
  setInterval(updateTime,60*1000);
})();
</script>

</body>
</html>
